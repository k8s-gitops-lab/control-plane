# Profil operateur optionnel.
# Les repos references ci-dessous doivent rester executables seuls avec leurs
# propres valeurs par defaut. Ce fichier ne fait que passer des surcharges
# coherentes quand on orchestre le POC depuis cockpit.
#
# Les versions du socle cluster (kubernetes, flannel, helm, charts MetalLB/
# Traefik, Gateway API...) sont pinnees dans
# infra-iac/ansible/group_vars/all.yml et ne sont pas surchargeables ici.
platform:
  domain: 192.168.33.100.nip.io
  gitlab:
    # gitlab.com (bascule big bang du 2026-07-10, cf. docs/backlog.md) : plus
    # d'instance locale dans le cluster, group racine du groupe gitlab.com.
    url: https://gitlab.com
    group: k8s-gitops-lab
  argocd:
    namespace: argocd
  repositories:
    infrastructure: ../infra-iac
    platform: ../platform-bootstrap
    gitops: ../platform-gitops
    toolbox: ../toolbox
    gitlabIac: ../gitlab-projects-iac

versions:
  argocd: v3.4.4
